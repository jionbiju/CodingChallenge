<!DOCTYPE html>
<html>
<head>
    <title>123Jobs - Personal Profile Registration</title>
</head>

<body>

<h2>Personal Profile Registration</h2>

<form>

<table border="1" cellpadding="8">

<tr>
    <td>Name</td>
    <td><input type="text" name="name"></td>
</tr>

<tr>
    <td>Address</td>
    <td><textarea name="address" rows="3" cols="30"></textarea></td>
</tr>

<tr>
    <td>Phone Number</td>
    <td><input type="tel" name="phone"></td>
</tr>

<tr>
    <td>Email Address</td>
    <td><input type="email" name="email"></td>
</tr>

<tr>
    <td>Your Picture</td>
    <td><input type="file" name="photo"></td>
</tr>

<tr>
    <td>College</td>
    <td><input type="text" name="college"></td>
</tr>

<tr>
    <td>Branch</td>
    <td><input type="text" name="branch"></td>
</tr>

<tr>
    <td>Personal History</td>
    <td>
        <textarea name="history" rows="5" cols="30"></textarea>
    </td>
</tr>

<tr>
    <td>Favourite Theory Subjects</td>
    <td>
        <input type="checkbox" name="subject" value="DAA"> DAA
        <input type="checkbox" name="subject" value="OS"> OS
        <input type="checkbox" name="subject" value="DBMS"> DBMS
    </td>
</tr>

<tr>
    <td>Favourite Practical Subjects</td>
    <td>
        <input type="checkbox" name="practical" value="Web"> Web Lab
        <input type="checkbox" name="practical" value="Java"> Java Lab
        <input type="checkbox" name="practical" value="Python"> Python Lab
    </td>
</tr>

<tr>
    <td>Username</td>
    <td><input type="text" name="username"></td>
</tr>

<tr>
    <td>Password</td>
    <td><input type="password" name="password"></td>
</tr>

<tr>
    <td colspan="2" align="center">
        <input type="submit" value="Register">
        <input type="reset" value="Reset">
    </td>
</tr>

</table>

</form>

</body>
</html>
