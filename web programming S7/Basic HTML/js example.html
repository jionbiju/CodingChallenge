<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let number = prompt("Enter a number");
        let sqr = number * number;
        document.write("The entered number is "+number+" and its square is "+sqr+"<br>");
        let res = confirm("Is it correct?");
        if(res){
            document.write("Square is correct")
        }
        else{
            document.write("incorrect square")
        }
    </script>
</body>
</html>5
