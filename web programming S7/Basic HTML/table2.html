<!doctype html>
<html>
  <head>
    <title>Table 2</title>
    <style>
      table {
        border-collapse: collapse;
        width: 400px;
        border: "4";
      }
      th,
      td {
        padding: 14px;
        text-align: center;
        background-color: #ffff;
      }
      a:link{
        color: rgb(248, 21, 0);
      }
      a:visited{
        color: yellow;
      }
    </style>
  </head>
  <body>
    <table border="1">
      <tr>
        <th>Company</th>
        <th>Model</th>
      </tr>
      <tr>
        <td>Dodge</td>
        <td>Challenger</td>
      </tr>
      <tr>
        <td>Maritu</td>
        <td>swift</td>
      </tr>
      <tr>
        <td>Jeep</td>
        <td>Wrangler</td>
      </tr>
      <tr>
        <td rowspan="3">Ford</td>
        <td>EcoSport</td>
      </tr>
      <tr>
        <td>Fusion</td>
      </tr>
      <tr>
        <td>Escape</td>
      </tr>
      <tr>
        <td>BMW</td>
        <td>5 series</td>
      </tr>
    </table>
    <h2><a href="https://www.google.com" target="_blank">GOOGLE</a></h2>
  </body>
</html>
